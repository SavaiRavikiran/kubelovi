replicaCount: 1

rbac:
  create: true

serviceAccount:
  create: true
  name: ""   # optional override (e.g. kubelens-sa for platform); when set, used instead of fullname
  annotations: {}

image:
  repository: iitrkp/test-kubelens
  tag: v13.0.0
  pullPolicy: IfNotPresent

imagePullSecrets: []

kubeconfig:
  secretName: ""
  mountPath: /root/.kube

service:
  type: ClusterIP
  port: 3006

# Ingress – URL per environment. Use -f values-<env>.yaml for dev/devint/sbx/qa/prod (see README).
# For ISDT/platform: set ingress_class and kubelens_host instead of ingress.className / ingress.hosts (see ISDT_INTEGRATION.md).
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - kubelens.d4n-sbx.eu.novartis.net   # default (sbx); override with values-dev.yaml, values-qa.yaml, etc.
  tls:
    # Set enabled: true only when a TLS secret exists (see README). false = HTTP only on Ingress (avoids ERR_SSL / missing secret).
    enabled: false
    secretName: ""   # optional: existing secret name for this host (e.g. wildcard cert); default is <release>-tls
    hosts:
      - kubelens.d4n-sbx.eu.novartis.net

# Optional: platform/ISDT compatibility (override ingress when set)
ingress_class: ""   # e.g. nginx or platf_ingress_class_name; overrides ingress.className when set
kubelens_host: ""   # e.g. kubelens.d4n-qa.eu.novartis.net; overrides ingress.hosts/tls.hosts when set

policyConfigPath: /app/backend/config/policy.json

# Optional: extra env vars (used by platform/ISDT, e.g. NODE_TLS_REJECT_UNAUTHORIZED: "0")
env: {}

# Optional: override probes and resources (used by platform/ISDT)
livenessProbe:
  path: /api/health
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  path: /api/health
  initialDelaySeconds: 5
  periodSeconds: 5
resources:
  requests:
    memory: "512Mi"
    cpu: "300m"
  limits:
    memory: "2Gi"
    cpu: "1500m"

policyConfig:
  # Namespaces matching these regexes are hidden from the namespace list for all users (e.g. deployment namespace)
  namespaceExcludePatterns:
    - "^apps-[a-z0-9-]*kubelens$"
  namespaceRules:
    - pattern: ".*otds.*"
      teams: ["*"]
    - pattern: ".*lego.*"
      teams: ["xedi"]
    - pattern: "paradox-.*sharedct"
      teams: ["aronda", "coredox", "midocs"]
    - pattern: "toqdox-.*sharedct"
      teams: ["esops", "apqr", "condor"]
    - pattern: "subway-.*sharedct"
      teams: ["subway"]
  tools:
    - kubernetes
  credentialsPolicy: {}
  teams:
    otds:
      name: Otds Team
      users: ["otds-user", "otds-lead"]
      environments: "*"
      namespaces: "*"
      dynamicNamespaceFiltering: true
      namespacePattern: otds
      includeEnvironmentPattern: true
      allowedPaths:
        - "/scripts/*"
        - "/app/*"
        - "/data/*"
        - "/app/dctm/*"
        - "/data/dctm/*"
        - "/data/*/logs/*"
        - "/data/*/app_data/*"
        - "/data/*/scripts/*"
        - "/app/tomcat/logs/*"
        - "/app/xPlore/*"
      blockedPaths: []
    subway:
