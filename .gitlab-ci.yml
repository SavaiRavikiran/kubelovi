stages:
  - build
  - test
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  LATEST_TAG: $CI_REGISTRY_IMAGE:latest

# Build stage
build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker tag $IMAGE_TAG $LATEST_TAG
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG
  only:
    - main
    - develop
    - merge_requests

# Test stage
test:
  stage: test
  image: node:18-alpine
  cache:
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npm run type-check
    - npm run test
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  only:
    - main
    - develop
    - merge_requests

# Security scanning
security_scan:
  stage: security
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  script:
    - docker run --rm -v $(pwd):/app -w /app securecodewarrior/docker-security-scan
  allow_failure: true
  only:
    - main
    - develop

# Deploy to development
deploy_dev:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_DEV
    - helm upgrade --install log-browser-dev ./helm 
      --namespace log-browser-dev 
      --create-namespace
      --set image.tag=$CI_COMMIT_SHA
      --set ingress.hosts[0].host=log-browser-dev.yourdomain.com
  environment:
    name: development
    url: https://log-browser-dev.yourdomain.com
  only:
    - develop

# Deploy to staging
deploy_staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_STAGING
    - helm upgrade --install log-browser-staging ./helm 
      --namespace log-browser-staging 
      --create-namespace
      --set image.tag=$CI_COMMIT_SHA
      --set ingress.hosts[0].host=log-browser-staging.yourdomain.com
  environment:
    name: staging
    url: https://log-browser-staging.yourdomain.com
  only:
    - main

# Deploy to production
deploy_prod:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl config use-context $KUBE_CONTEXT_PROD
    - helm upgrade --install log-browser-prod ./helm 
      --namespace log-browser-prod 
      --create-namespace
      --set image.tag=$CI_COMMIT_SHA
      --set ingress.hosts[0].host=log-browser.yourdomain.com
      --set replicaCount=5
  environment:
    name: production
    url: https://log-browser.yourdomain.com
  when: manual
  only:
    - main