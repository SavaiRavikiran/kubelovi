apiVersion: v1
kind: Namespace
metadata:
  name: otds
---
# ------------------------
# POD: cs-0
# ------------------------
apiVersion: v1
kind: Pod
metadata:
  name: cs-0
  namespace: otds
spec:
  containers:
    - name: cs-container
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Starting log tail for cs-0...";
          tail -F \
            /scripts/ansible.log \
            /scripts/custum/*.logs \
            /app/dctm/server/dba/log/${GR_DOCBASE}.log \
            /app/dctm/server/dba/log/${DOCBASE_NAME}.log \
            /app/dctm/server/dba/log/docbroker*.log \
            /app/dctm/server/${JBOSS_VERSION}/logs/catalina.out \
            /app/dctm/server/${JBOSS_VERSION}/logs/*.log \
            /data/dctm/${HOSTNAME}/scripts/${RELEASE_VERSION}/Build/ansible-*.log
      volumeMounts:
        - name: logs
          mountPath: /
  volumes:
    - name: logs
      hostPath:
        path: /
---
