apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubelens.fullname" . }}
  labels:
    {{- include "kubelens.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubelens.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubelens.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "kubelens.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3006
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3006"
            - name: POLICY_CONFIG_PATH
              value: {{ .Values.policyConfigPath | quote }}
          volumeMounts:
            - name: policy-config
              mountPath: {{ .Values.policyConfigPath | quote }}
              subPath: policy.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: policy-config
          configMap:
            name: {{ include "kubelens.fullname" . }}-policy
