# SBX – HTTP only on Ingress (:80). https:// will 404 on nginx – use http:// OR values-sbx-https.yaml + TLS secret.
# Deploy: helm upgrade --install apps-sbxkubelens . -n apps-sbxkubelens --create-namespace -f values-sbx.yaml
namespace: apps-sbxkubelens

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - kubelens.d4n-sbx.eu.novartis.net
  tls:
    enabled: false
    hosts:
      - kubelens.d4n-sbx.eu.novartis.net
