# Novartis client – Kubelens Helm values
# Install: helm upgrade --install kubelens ./kubelens -f novartis-values.yaml

replicaCount: 1

image:
  repository: kubelens
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3006

policyConfigPath: /app/backend/config/policy.json

policyConfig:
  namespaceRules:
    - pattern: ".*otds.*"
      teams: ["*"]
    - pattern: ".*lego.*"
      teams: ["xedi"]
    - pattern: "paradox-.*sharedct"
      teams: ["aronda", "coredox", "midocs"]
    - pattern: "toqdox-.*sharedct"
      teams: ["esops", "apqr", "condor"]
    - pattern: "subway-.*sharedct"
      teams: ["subway"]
  tools:
    - kubernetes
  credentialsPolicy: {}
  teams:
    otds:
      name: Otds Team
      users: ["otds-user", "otds-lead"]
      environments: "*"
      namespaces: "*"
      dynamicNamespaceFiltering: true
      namespacePattern: otds
      includeEnvironmentPattern: true
      allowedPaths:
        - "/scripts/*"
        - "/app/*"
        - "/data/*"
        - "/app/dctm/*"
        - "/data/dctm/*"
        - "/data/*/logs/*"
        - "/data/*/app_data/*"
        - "/data/*/scripts/*"
        - "/app/tomcat/logs/*"
        - "/app/xPlore/*"
      blockedPaths: []
    subway:
      name: Subway Team
      users: ["subway-user", "subway-lead"]
      environments: "*"
      namespaces: "*"
      dynamicNamespaceFiltering: true
      namespacePattern: subway
      includeEnvironmentPattern: true
      allowedPaths:
        - "/scripts/*"
        - "/app/*"
        - "/data/*"
        - "/app/dctm/*"
        - "/data/dctm/*"
        - "/data/*/logs/*"
        - "/data/*/app_data/*"
        - "/data/*/scripts/*"
        - "/app/tomcat/logs/*"
        - "/app/xPlore/*"
